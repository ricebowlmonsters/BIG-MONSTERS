<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RBM Pro</title>
  <link rel="stylesheet" href="rbm-pro.css">
  <style>
    @media print {
      body * {
        visibility: hidden;
      }
      #ownerPengajuanModal, #ownerPengajuanModal * {
        visibility: visible;
      }
      #ownerPengajuanModal {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        height: auto !important;
        display: block !important;
        background: transparent !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .modal-content {
        position: static !important;
        display: block !important;
        box-shadow: none !important;
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        height: auto !important;
        max-height: none !important;
        overflow: visible !important;
      }
      #print-area, #ownerPengajuanModalBody, .scrollable-table-container {
        position: static !important;
        display: block !important;
        overflow: visible !important;
        max-height: none !important;
        height: auto !important;
      }
      .modal-footer, .modal-close {
        display: none !important;
      }
      table {
        page-break-inside: auto;
        width: 100% !important;
      }
      tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }
      thead {
        display: table-header-group;
      }
      img {
        max-height: 400px !important;
        page-break-inside: avoid;
        display: block;
        margin-top: 10px;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
</head>
<body>
<header class="rbm-page-header">
  <a href="index.html" class="rbm-back-btn">&#8249;</a>
  <h1 class="rbm-page-title">Pengajuan</h1>
</header>
<div class="rbm-content-wrap">
<section class="rbm-outlet-card">
  <label for="rbm-outlet-select" class="rbm-outlet-label">Pilih Outlet:</label>
  <select id="rbm-outlet-select" class="rbm-outlet-select"></select>
</section>

<!-- OWNER: Container for incoming submissions -->
<div id="owner-view-container" style="display:none; padding-top:0;">
  <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px;">
    <button id="tab-pending" class="btn btn-primary" onclick="switchOwnerTab('pending')" style="width: auto;">Pengajuan Baru</button>
    <button id="tab-history" class="btn btn-secondary" onclick="switchOwnerTab('history')" style="width: auto; background: white; color: #374151; border: 1px solid #e5e7eb;">Riwayat Persetujuan</button>
    <button id="btn-refresh-owner" class="btn btn-secondary" onclick="fetchSubmissionsForOwner()" style="width: auto; margin-left: auto;">🔄 Refresh</button>
  </div>

  <div id="pengajuan-pending-list">
    <p>Memuat pengajuan baru...</p>
  </div>

  <div id="pengajuan-history-list" style="display: none;">
    <p>Memuat riwayat...</p>
  </div>
</div>

<script>
(function(){
  var u = JSON.parse(localStorage.getItem('rbm_user') || '{}');
  var outlets = JSON.parse(localStorage.getItem('rbm_outlets') || '[]');
  var names = JSON.parse(localStorage.getItem('rbm_outlet_names') || '{}');
  var sel = document.getElementById('rbm-outlet-select');

  window.switchOwnerTab = function(tab) {
      const pendingBtn = document.getElementById('tab-pending');
      const historyBtn = document.getElementById('tab-history');
      const pendingList = document.getElementById('pengajuan-pending-list');
      const historyList = document.getElementById('pengajuan-history-list');
  
      if (tab === 'pending') {
          pendingBtn.className = 'btn btn-primary';
          pendingBtn.style.cssText = 'width: auto;';
          historyBtn.className = 'btn btn-secondary';
          historyBtn.style.cssText = 'width: auto; background: white; color: #374151; border: 1px solid #e5e7eb;';
          pendingList.style.display = 'block';
          historyList.style.display = 'none';
      } else {
          historyBtn.className = 'btn btn-primary';
          historyBtn.style.cssText = 'width: auto;';
          pendingBtn.className = 'btn btn-secondary';
          pendingBtn.style.cssText = 'width: auto; background: white; color: #374151; border: 1px solid #e5e7eb;';
          pendingList.style.display = 'none';
          historyList.style.display = 'block';
      }
  };

  var isOwnerOrDev = String(u.role || '').toLowerCase() === 'owner' || (u.username || '').toLowerCase() === 'burhan';
  // --- OWNER WORKFLOW ---
  if (isOwnerOrDev) {
    document.querySelector('.rbm-page-title').textContent = 'Persetujuan Pengajuan';
    
    // Sembunyikan form manager secara permanen dengan CSS
    var style = document.createElement('style');
    style.innerHTML = '#pengajuan-view { display: none !important; }';
    document.head.appendChild(style);

    var outletCard = document.querySelector('.rbm-outlet-card');
    if (outletCard) outletCard.style.display = 'none';
    
    document.getElementById('owner-view-container').style.display = 'block';

    function fetchSubmissionsForOwner() {
      const pendingListContainer = document.getElementById('pengajuan-pending-list');
      const historyListContainer = document.getElementById('pengajuan-history-list');
      
      if (typeof firebase === 'undefined' || !firebase.apps.length) {
          setTimeout(fetchSubmissionsForOwner, 1000);
          return;
      }
      
      const db = firebase.database();
      
      const btnRefresh = document.getElementById('btn-refresh-owner');
      if (btnRefresh) { btnRefresh.textContent = 'Memuat...'; btnRefresh.disabled = true; }

      let tfData = null;
      let pcData = null;
      let tfLoaded = false;
      let pcLoaded = false;
      
      const renderList = () => {
          if (!tfLoaded || !pcLoaded) return;
          
          let pendingSubmissions = [];
          let historySubmissions = [];

          const processData = (dataMap, type) => {
              if (dataMap) {
                  Object.keys(dataMap).forEach(k => {
                      const item = { id: k, type: type, data: dataMap[k] };
                      if (!item.data.status || item.data.status === 'pending') {
                          pendingSubmissions.push(item);
                      } else {
                          historySubmissions.push(item);
                      }
                  });
              }
          };

          processData(tfData, 'tf');
          processData(pcData, 'pc');
          
          pendingSubmissions.sort((a,b) => (b.data.createdAt || 0) - (a.data.createdAt || 0));
          historySubmissions.sort((a,b) => (b.data.updatedAt || b.data.createdAt || 0) - (a.data.updatedAt || a.data.createdAt || 0));
          
          const buildHtml = (list, emptyMsg) => {
              if (list.length === 0) return `<p style="text-align:center; color:#888; padding: 20px;">${emptyMsg}</p>`;
              let html = '';
              list.forEach(sub => {
              const d = sub.data;
              const isTf = sub.type === 'tf';
              const outletName = d.outlet ? (names[d.outlet] || d.outlet.toUpperCase()) : 'Semua Outlet';
              const submittedBy = d.userName ? `${d.userName} (${d.userRole})` : 'Anonim';
              const title = isTf ? `TF: ${d.suplier || 'Suplier'} - ${d.keterangan || ''}` : `Petty Cash`;
              const total = isTf ? (d.total || d.nominal || 0) : (d.nominal || 0);
              const dateStr = d.tanggal || d.tanggalPengajuan || (d.createdAt ? new Date(d.createdAt).toLocaleDateString('id-ID') : '-');
              const status = d.status || 'pending';
              const statusColor = status === 'approved' ? '#059669' : (status === 'rejected' ? '#dc2626' : '#d97706');
              const statusText = status === 'approved' ? 'Disetujui' : (status === 'rejected' ? 'Ditolak' : 'Menunggu');
              
              window._pengajuanDataMap = window._pengajuanDataMap || {};
              window._pengajuanDataMap[sub.id] = sub;
              
          html += `
                  <div class="rbm-outlet-card" onclick="openOwnerPengajuanModal('${sub.id}')" style="cursor:pointer; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; border-left: 4px solid ${statusColor};">
                    <div>
                      <div style="font-size:11px; font-weight:bold; color:#4C2A85; text-transform:uppercase; margin-bottom:4px; letter-spacing: 0.5px;">📍 ${outletName} | 👤 ${submittedBy}</div>
                      <strong style="display:block; margin-bottom:4px; font-size:15px; color:#1f2937;">${title}</strong>
                      <span style="font-size:12px; color:#64748b;">${dateStr}</span>
                      <span style="font-size:11px; padding:2px 8px; border-radius:12px; margin-left:8px; background-color:${statusColor}20; color:${statusColor}; font-weight:bold;">${statusText}</span>
                    </div>
                    <strong style="font-size:1.2em; color:#111827;">Rp ${parseInt(total).toLocaleString('id-ID')}</strong>
                  </div>
          `;
          });
              return html;
          };

          pendingListContainer.innerHTML = buildHtml(pendingSubmissions, 'Tidak ada pengajuan baru.');
          historyListContainer.innerHTML = buildHtml(historySubmissions, 'Belum ada riwayat persetujuan.');
          if (btnRefresh) { btnRefresh.textContent = '🔄 Refresh'; btnRefresh.disabled = false; }
      };

      // [OPTIMASI] Gunakan once() alih-alih on() agar browser tidak hang karena ukuran payload yang raksasa
      Promise.all([
          db.ref('rbm_pro/pengajuan_tf').orderByKey().limitToLast(10).once('value'),
          db.ref('rbm_pro/petty_cash/pengajuan').orderByKey().limitToLast(10).once('value')
      ]).then(snaps => {
          tfData = snaps[0].val();
          pcData = snaps[1].val();
          tfLoaded = true;
          pcLoaded = true;
          renderList();
      }).catch(err => {
          console.error(err);
          if (btnRefresh) { btnRefresh.textContent = '🔄 Refresh'; btnRefresh.disabled = false; }
          pendingListContainer.innerHTML = '<p style="color:red; text-align:center;">Gagal memuat data.</p>';
      });
    }
    fetchSubmissionsForOwner();

  // --- MANAGER/DEFAULT WORKFLOW ---
  } else {
    if (sel) {
      sel.innerHTML = '';
      outlets.forEach(function(id) {
        var opt = document.createElement('option');
        opt.value = id;
        opt.textContent = names[id] || (id.charAt(0).toUpperCase() + id.slice(1));
        sel.appendChild(opt);
      });
      if (String(u.role || '').toLowerCase() === 'manager' && u.outlet) {
        sel.value = u.outlet;
        sel.disabled = true;
      } else {
        var last = localStorage.getItem('rbm_last_selected_outlet');
        if (last && outlets.indexOf(last) >= 0) sel.value = last;
        else if (outlets.length) sel.value = outlets[0];
        sel.addEventListener('change', function() { localStorage.setItem('rbm_last_selected_outlet', sel.value); });
      }
    }

    // Tampilkan riwayat pengajuan khusus untuk manager
    setTimeout(function() {
      var historySection = document.getElementById('manager-history-section');
      if (historySection) historySection.style.display = 'block';
    }, 100);

    function fetchSubmissionsForManager() {
      const listContainer = document.getElementById('manager-pengajuan-list');
      if (!listContainer) return;
      
      if (typeof firebase === 'undefined' || !firebase.apps.length) {
          setTimeout(fetchSubmissionsForManager, 1000);
          return;
      }
      const db = firebase.database();
      
      let tfData = null; let pcData = null;
      let tfLoaded = false; let pcLoaded = false;
      
      const renderList = () => {
          if (!tfLoaded || !pcLoaded) return;
          let allSubmissions = [];
          if (tfData) Object.keys(tfData).forEach(k => allSubmissions.push({ id: k, type: 'tf', data: tfData[k] }));
          if (pcData) Object.keys(pcData).forEach(k => allSubmissions.push({ id: k, type: 'pc', data: pcData[k] }));
          
          const btnRefresh = document.getElementById('btn-refresh-manager');
          if (btnRefresh) { btnRefresh.textContent = '🔄 Refresh'; btnRefresh.disabled = false; }

          if (allSubmissions.length === 0) {
             listContainer.innerHTML = '<p style="text-align:center; color:#888;">Belum ada riwayat pengajuan.</p>';
             return;
          }
          
          allSubmissions.sort((a,b) => (b.data.createdAt || 0) - (a.data.createdAt || 0));
          let html = '';
          allSubmissions.forEach(sub => {
              const d = sub.data;
              const isTf = sub.type === 'tf';
              const title = isTf ? `TF: ${d.suplier || 'Suplier'}` : `Petty Cash`;
              const total = isTf ? (d.total || d.nominal || 0) : (d.nominal || 0);
              const dateStr = d.tanggal || d.tanggalPengajuan || (d.createdAt ? new Date(d.createdAt).toLocaleDateString('id-ID') : '-');
              const status = d.status || 'pending';
              const statusColor = status === 'approved' ? '#059669' : (status === 'rejected' ? '#dc2626' : '#d97706');
              const statusText = status === 'approved' ? 'Disetujui' : (status === 'rejected' ? 'Ditolak' : 'Menunggu');
              
              html += `<div style="background:#f9fafb; padding:12px; border-radius:8px; border:1px solid #e5e7eb; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;"><div><strong style="display:block; margin-bottom:4px; font-size:14px;">${title}</strong><span style="font-size:12px; color:#64748b;">${dateStr}</span></div><div style="text-align:right;"><strong style="font-size:14px; display:block; margin-bottom:4px;">Rp ${parseInt(total).toLocaleString('id-ID')}</strong><span style="font-size:11px; padding:2px 8px; border-radius:12px; background-color:${statusColor}20; color:${statusColor}; font-weight:bold;">${statusText}</span></div></div>`;
          });
          listContainer.innerHTML = html;
      };
      
      const btnRefresh = document.getElementById('btn-refresh-manager');
      if (btnRefresh) { btnRefresh.textContent = 'Memuat...'; btnRefresh.disabled = true; }

      // [OPTIMASI] Gunakan once() agar tidak berat.
      Promise.all([
          db.ref('rbm_pro/pengajuan_tf').orderByKey().limitToLast(10).once('value'),
          db.ref('rbm_pro/petty_cash/pengajuan').orderByKey().limitToLast(10).once('value')
      ]).then(snaps => {
          tfData = snaps[0].val();
          pcData = snaps[1].val();
          tfLoaded = true;
          pcLoaded = true;
          renderList();
      });
    }
    fetchSubmissionsForManager();
  }
})();

function openOwnerPengajuanModal(id) {
  const sub = window._pengajuanDataMap[id];
  const d = sub.data;
  const isTf = sub.type === 'tf';
  
  const names = JSON.parse(localStorage.getItem('rbm_outlet_names') || '{}');
  const outletName = d.outlet ? (names[d.outlet] || d.outlet.toUpperCase()) : 'Semua Outlet';
  const submittedBy = d.userName ? `${d.userName} (${d.userRole})` : 'Anonim';
  
  // [BARU] Tandai bahwa Owner sudah membaca pengajuan ini agar notifikasi hilang
  var u = JSON.parse(localStorage.getItem('rbm_user') || '{}');
  var isOwnerOrDev = String(u.role || '').toLowerCase() === 'owner' || (u.username || '').toLowerCase() === 'burhan';
  if (isOwnerOrDev && !d.viewedByOwner) {
      const dbPath = isTf ? `rbm_pro/pengajuan_tf/${sub.id}` : `rbm_pro/petty_cash/pengajuan/${sub.id}`;
      firebase.database().ref(dbPath).update({ viewedByOwner: true });
  }

  const modal = document.getElementById('ownerPengajuanModal');
  const body = document.getElementById('ownerPengajuanModalBody');
  const title = document.getElementById('ownerPengajuanModalTitle');
  
  title.innerHTML = (isTf ? 'Rincian Pengajuan Transfer' : 'Rincian Pengajuan Petty Cash') + 
    `<div style="font-size:13px; color:#6b7280; font-weight:normal; margin-top:4px;">📍 Outlet: <strong>${outletName}</strong> | 👤 <strong>${submittedBy}</strong></div>`;
  
  let html = '<table style="width:100%; border-collapse:collapse; margin-bottom:15px; font-size:13px;">';
  if (isTf) {
      html += `
        <tr><td style="padding:8px; border-bottom:1px solid #eee; width:120px;"><strong>Suplier</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">${d.suplier || '-'}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>Tgl Nota</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">${d.tglNota || '-'}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>Tgl J/T</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">${d.tglJt || '-'}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>Nominal</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">Rp ${parseInt(d.nominal||0).toLocaleString('id-ID')}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>Total</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">Rp ${parseInt(d.total||0).toLocaleString('id-ID')}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>Bank Acc</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">${d.bankAcc || '-'}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>A/N</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">${d.atasNama || '-'}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>Keterangan</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">${d.keterangan || '-'}</td></tr>
      </table>
      `;
  } else {
      html += `
        <tr><td style="padding:8px; border-bottom:1px solid #eee; width:120px;"><strong>Nominal</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">Rp ${parseInt(d.nominal||0).toLocaleString('id-ID')}</td></tr>
        <tr><td style="padding:8px; border-bottom:1px solid #eee;"><strong>Tgl Pengajuan</strong></td><td style="padding:8px; border-bottom:1px solid #eee;">${d.tanggalPengajuan || '-'}</td></tr>
      </table>
      `;
      
      if (d.recapData) {
          // recapData bisa jadi object (baru) atau string JSON (lama) → normalisasi biar Owner tidak crash
          var recap = d.recapData;
          if (typeof recap === 'string') {
            try { recap = JSON.parse(recap); } catch(e) { recap = {}; }
          }
          if (!recap || typeof recap !== 'object') recap = {};
          var detailsSince = [];
          if (Array.isArray(recap.detailsSince)) {
            detailsSince = recap.detailsSince;
          } else if (recap.detailsSince && typeof recap.detailsSince === 'object') {
            detailsSince = Object.values(recap.detailsSince);
          }
          html += `
            <div style="display: flex; justify-content: space-around; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f8f9fa;">
              <div style="text-align: center;">
                <div style="font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Dana Masuk Terakhir</div>
                <div style="font-size: 16px; font-weight: bold; color: #1e40af; margin-top: 4px;">Rp ${parseInt(recap.lastKredit||0).toLocaleString('id-ID')}</div>
                <div style="font-size: 10px; color: #9ca3af; margin-top: 2px;">Tgl: ${recap.lastKreditDate || '-'}</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Total Pengeluaran</div>
                <div style="font-size: 16px; font-weight: bold; color: #dc2626; margin-top: 4px;">Rp ${parseInt(recap.totalDebitSince||0).toLocaleString('id-ID')}</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Sisa Saldo</div>
                <div style="font-size: 16px; font-weight: bold; color: #059669; margin-top: 4px;">Rp ${parseInt(recap.sisa||0).toLocaleString('id-ID')}</div>
              </div>
            </div>`;
          if (detailsSince.length > 0) {
              html += `<div class="scrollable-table-container" style="max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px;">
                    <table style="width:100%; border-collapse:collapse; font-size:12px;">
                    <thead style="position: sticky; top: 0; z-index: 1;"><tr style="background:#1e40af; color:white;">
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:center; -webkit-print-color-adjust: exact;">No</th>
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:center; -webkit-print-color-adjust: exact;">Tanggal</th>
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:left; -webkit-print-color-adjust: exact;">Nama Keterangan</th>
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:right; -webkit-print-color-adjust: exact;">Qty</th>
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:left; -webkit-print-color-adjust: exact;">Satuan</th>
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:right; -webkit-print-color-adjust: exact;">Harga</th>
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:right; -webkit-print-color-adjust: exact;">Debit</th>
                        <th style="padding:8px; border:1px solid #e2e8f0; text-align:right; -webkit-print-color-adjust: exact;">Saldo</th>
                    </tr></thead><tbody>`;
              let no = 1;
              let currentSaldo = parseFloat(recap.lastKredit) || 0;
              detailsSince.forEach(detail => {
                  const nm = detail.nama || detail.keterangan || '-';
                  const qty = detail.jumlah || '';
                  const satuan = detail.satuan || '';
                  const harga = parseFloat(detail.harga) || 0;
                  const val = parseFloat(detail.debit || detail.keluar || detail.total) || 0;
                  const tg = detail.tanggal || detail.date || '-';
                  currentSaldo -= val;
                  html += `<tr>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:center;">${no++}</td>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:center;">${tg}</td>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:left;">${nm}</td>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:right;">${qty}</td>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:left;">${satuan}</td>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:right;">${harga ? 'Rp ' + harga.toLocaleString('id-ID') : ''}</td>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:right; font-weight:bold;">Rp ${val.toLocaleString('id-ID')}</td>
                      <td style="padding:6px; border:1px solid #e2e8f0; text-align:right; font-weight:bold; color:${currentSaldo < 0 ? '#dc2626' : '#059669'};">Rp ${currentSaldo.toLocaleString('id-ID')}</td>
                  </tr>`;
              });
              html += `</tbody></table></div>`;
          }
      }
  }
  
  if (d.fotoNotaUrl) html += `<div style="margin-bottom:10px;"><strong>Foto Nota:</strong><br><img src="${d.fotoNotaUrl}" style="max-width:100%; max-height:200px; border-radius:8px; margin-top:5px; cursor:pointer;" onclick="window.open(this.src, '_blank')"></div>`;
  if (d.fotoTtdUrl) html += `<div style="margin-bottom:10px;"><strong>Foto TTD:</strong><br><img src="${d.fotoTtdUrl}" style="max-width:100%; max-height:200px; border-radius:8px; margin-top:5px; cursor:pointer;" onclick="window.open(this.src, '_blank')"></div>`;
  if (d.fotoPengajuan) html += `<div style="margin-bottom:10px;"><strong>Foto Bukti:</strong><br><img src="${d.fotoPengajuan}" style="max-width:100%; max-height:200px; border-radius:8px; margin-top:5px; cursor:pointer;" onclick="window.open(this.src, '_blank')"></div>`;
  
  body.innerHTML = html;
  
  const approveBtn = document.getElementById('approveBtn');
  const rejectBtn = document.getElementById('rejectBtn');
  
  if (d.status === 'approved' || d.status === 'rejected') {
      approveBtn.style.display = 'none';
      rejectBtn.style.display = 'none';
      const statusColor = d.status === 'approved' ? 'green' : 'red';
      const statusText = d.status === 'approved' ? 'DISETUJUI' : 'DITOLAK';
      body.innerHTML += `<div style="text-align:center; padding:10px; margin-top:15px; font-weight:bold; color:${statusColor}; border:2px solid ${statusColor}; border-radius:8px;">STATUS: ${statusText}</div>`;
  } else {
      approveBtn.style.display = 'inline-block';
      rejectBtn.style.display = 'inline-block';
  }
  
  modal.style.display = 'flex';
  approveBtn.onclick = () => updatePengajuanStatus(sub.type, sub.id, 'approved');
  rejectBtn.onclick = () => updatePengajuanStatus(sub.type, sub.id, 'rejected');
}

function closeOwnerPengajuanModal() { document.getElementById('ownerPengajuanModal').style.display = 'none'; }

function updatePengajuanStatus(type, id, status) {
    const actionText = status === 'approved' ? 'DISETUJUI' : 'DITOLAK';
    AppPopup.confirm(`Tandai pengajuan ini sebagai <strong>${actionText}</strong>?`, 'Konfirmasi', function() {
        const dbPath = type === 'tf' ? `rbm_pro/pengajuan_tf/${id}` : `rbm_pro/petty_cash/pengajuan/${id}`;
        
        firebase.database().ref(dbPath).update({
            status: status,
            viewedByManager: false, // Reset agar Manager mendapat Notifikasi ACC
            updatedAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            AppPopup.success('Status berhasil diupdate.');
            closeOwnerPengajuanModal();
        }).catch(err => {
            console.error(err);
            var msg = (err && (err.message || err.code)) ? (err.message || err.code) : (err ? String(err) : 'unknown error');
            AppPopup.error('Gagal update: ' + msg);
        });
    });
}

<script>
// [BARU] Logika Custom Popup dipindah ke ATAS agar menimpa alert/confirm bawaan sistem sejak awal
const AppPopup = {
  show: function(title, message, icon, isConfirm, onConfirm) {
    const modal = document.getElementById('customPopupModal');
    if (!modal) return;
    document.getElementById('customPopupTitle').textContent = title;
    document.getElementById('customPopupMessage').innerHTML = message;
    document.getElementById('customPopupIcon').textContent = icon;
    const okBtn = document.getElementById('customPopupOkBtn');
    const cancelBtn = document.getElementById('customPopupCancelBtn');
    const newOkBtn = okBtn.cloneNode(true);
    okBtn.parentNode.replaceChild(newOkBtn, okBtn);
    const newCancelBtn = cancelBtn.cloneNode(true);
    cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
    if (isConfirm) {
      newCancelBtn.style.display = 'inline-block';
      newCancelBtn.onclick = function() { modal.style.display = 'none'; };
      newOkBtn.onclick = function() { modal.style.display = 'none'; if (onConfirm) onConfirm(); };
    } else {
      newCancelBtn.style.display = 'none';
      newOkBtn.onclick = function() { modal.style.display = 'none'; if (onConfirm) onConfirm(); };
    }
    modal.style.display = 'flex';
  },
  alert: function(message, title = 'Informasi', icon = 'ℹ️') {
    this.show(title, message, icon, false);
  },
  success: function(message, title = 'Berhasil') {
    this.show(title, message, '✅', false);
  },
  error: function(message, title = 'Error') {
    this.show(title, message, '❌', false);
  },
  confirm: function(message, title, onConfirm) {
    this.show(title, message, '❓', true, onConfirm);
  }
};

// Override permanent window.alert dan window.confirm agar device popup tidak pernah muncul
window.alert = function(msg) { 
    const msgStr = msg ? msg.toString().toLowerCase() : '';
    const btn = document.getElementById('submitButtonPengajuan');
    
    if (msgStr.includes('berhasil')) {
        AppPopup.success('Pengajuan sudah dikirim, tunggu disetujui.', 'Pengajuan');
    } else if (msgStr.includes('gagal') || msgStr.includes('error')) {
        AppPopup.error(msg, 'Gagal');
    } else {
        AppPopup.alert(msg, 'Pesan'); 
    }
    
    if (btn && btn.disabled) {
        btn.disabled = false;
        btn.textContent = 'Kirim Pengajuan';
    }
};

window.confirm = function(msg) {
    console.log("Device confirm dicegat: " + msg);
    return true; // Bypass otomatis agar proses jalan tanpa jeda/alert
};
</script>

<script>
// [BARU] Patch untuk mengatasi error "Write too large" saat menyimpan pengajuan Petty Cash
(function() {
    function patchFirebaseWriteSize() {
        if (typeof firebase === 'undefined' || !firebase.database) {
            setTimeout(patchFirebaseWriteSize, 500);
            return;
        }
        var refProto = firebase.database.Reference.prototype;
        if (refProto._patchedForWriteSize) return;
        refProto._patchedForWriteSize = true;

        function deepCleanHugeStrings(obj, depth) {
            if (!obj || typeof obj !== 'object') return;
            depth = depth || 0;
            if (depth > 20) return; // Mencegah max call stack
            
            if (Array.isArray(obj.detailsSince)) {
                obj.detailsSince.forEach(function(d) {
                    if (d && typeof d === 'object' && d.foto) delete d.foto;
                });
            }
            Object.keys(obj).forEach(function(key) {
                if (typeof obj[key] === 'string') {
                    if (obj[key].length > 2000000) { // Jika lebih dari ~2MB
                        console.warn("Mencegat pengiriman data yang terlalu besar pada key:", key);
                        obj[key] = ''; 
                    }
                } else if (obj[key] && typeof obj[key] === 'object') {
                    deepCleanHugeStrings(obj[key], depth + 1);
                }
            });
        }

        var origPush = refProto.push;
        refProto.push = function(data, onComplete) {
            deepCleanHugeStrings(data);
            return origPush.call(this, data, onComplete);
        };

        var origSet = refProto.set;
        refProto.set = function(data, onComplete) {
            deepCleanHugeStrings(data);
            return origSet.call(this, data, onComplete);
        };

        var origUpdate = refProto.update;
        refProto.update = function(data, onComplete) {
            deepCleanHugeStrings(data);
            return origUpdate.call(this, data, onComplete);
        };
    }
    patchFirebaseWriteSize();
})();

// [BARU] Bersihkan antrian sinkronisasi offline (localStorage) yang nyangkut dan error berulang
(function cleanStuckPendingSync() {
    try {
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.includes('PENDING')) {
                const val = localStorage.getItem(key);
                if (val && val.length > 2000000) { // Data pending > 2MB
                    let parsed = JSON.parse(val);
                    if (Array.isArray(parsed)) {
                        let isModified = false;
                        parsed.forEach(item => {
                            if (item.payload) {
                                if (item.payload.recapData && Array.isArray(item.payload.recapData.detailsSince)) {
                                    item.payload.recapData.detailsSince.forEach(d => {
                                        if (d.foto) { delete d.foto; isModified = true; }
                                    });
                                }
                                ['foto', 'fotoPengajuan', 'fotoNotaUrl', 'fotoTtdUrl'].forEach(f => {
                                    if (typeof item.payload[f] === 'string' && item.payload[f].length > 1500000) {
                                        item.payload[f] = '';
                                        isModified = true;
                                    }
                                });
                            }
                        });
                        if (isModified) {
                            localStorage.setItem(key, JSON.stringify(parsed));
                            console.log('✅ Antrian offline berukuran raksasa berhasil dibersihkan di:', key);
                        }
                    }
                }
            }
        }
    } catch (e) {
        console.error("Gagal membersihkan pending sync:", e);
    }
})();
</script>
